<!DOCTYPE html>
<html>

<head>

    <title>Nearby Hospitals</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial;
            padding:30px;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 4px 12px rgba(0,0,0,0.1);
            text-align:center;
        }

        iframe{
            border-radius:20px;
            margin-top:20px;
        }

        .emergency-box{
            background:#fff4ee;
            border:2px solid #ffd2bf;
            padding:20px;
            border-radius:20px;
            margin-top:25px;
        }

        .call-btn{
            margin-top:10px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>🏥 Nearby Hospitals</h1>

    <p>
        Find nearby hospitals in real-time
    </p>

    <div class="emergency-box">

        <h3>🚨 Emergency Medical Numbers</h3>

        <p>
            <strong>108</strong> — Emergency Ambulance Service
        </p>

        <a href="tel:108">

            <button class="btn btn-danger call-btn">
                📞 Call 108
            </button>

        </a>

        <hr>

        <p>
            <strong>104</strong> — Health Helpline
        </p>

        <a href="tel:104">

            <button class="btn btn-danger call-btn">
                📞 Call 104
            </button>

        </a>

    </div>

    <a href="https://www.google.com/maps/search/hospital+near+me"
       target="_blank">

        <button class="btn btn-danger btn-lg mt-4 mb-4">
            🗺️ Open Google Maps
        </button>

    </a>

    <iframe
        src="https://www.google.com/maps?q=hospital+near+me&output=embed"
        width="100%"
        height="500">
    </iframe>

</div>

</body>
</html>
