<!DOCTYPE html>
<html>

<head>

    <title>Nearby Towing Services</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial;
            padding:30px;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 4px 12px rgba(0,0,0,0.1);
            text-align:center;
        }

        iframe{
            border-radius:20px;
            margin-top:20px;
        }

        .emergency-box{
            background:#eefaf3;
            border:2px solid #b7ebc6;
            padding:20px;
            border-radius:20px;
            margin-top:25px;
        }

        .call-btn{
            margin-top:10px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>🚗 Nearby Towing Services</h1>

    <p>
        Find nearby towing and roadside assistance
    </p>

    <div class="emergency-box">

        <h3>🚨 Roadside Assistance</h3>

        <p>
            Vehicle breakdown? Contact towing support immediately.
        </p>

        <p>
            National Highway Helpline:
            <strong>1033</strong>
        </p>

        <a href="tel:1033">

            <button class="btn btn-success call-btn">
                📞 Call 1033
            </button>

        </a>

    </div>

    <a href="https://www.google.com/maps/search/towing+service+near+me"
       target="_blank">

        <button class="btn btn-dark btn-lg mt-4 mb-4">
            🗺️ Open Google Maps
        </button>

    </a>

    <iframe
        src="https://www.google.com/maps?q=towing+service+near+me&output=embed"
        width="100%"
        height="500">
    </iframe>

</div>

</body>
</html>
