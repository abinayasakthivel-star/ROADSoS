<!DOCTYPE html>
<html>

<head>

    <title>Nearby Ambulance Services</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial;
            padding:30px;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 4px 12px rgba(0,0,0,0.1);
            text-align:center;
        }

        iframe{
            border-radius:20px;
            margin-top:20px;
        }

        .emergency-box{
            background:#fff3f3;
            border:2px solid #ffcccc;
            padding:20px;
            border-radius:20px;
            margin-top:25px;
        }

        .call-btn{
            margin-top:10px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>🚑 Nearby Ambulance Services</h1>

    <p>
        Find nearby ambulance services in real-time
    </p>

    <!-- EMERGENCY CONTACTS -->

    <div class="emergency-box">

        <h3>🚨 Emergency Ambulance Numbers</h3>

        <p>
            <strong>108</strong> — Government Emergency Ambulance
        </p>

        <a href="tel:108">

            <button class="btn btn-danger call-btn">
                📞 Call 108
            </button>

        </a>

        <hr>

        <p>
            <strong>102</strong> — Medical Transport Service
        </p>

        <a href="tel:102">

            <button class="btn btn-danger call-btn">
                📞 Call 102
            </button>

        </a>

    </div>

    <!-- GOOGLE MAPS BUTTON -->

    <a href="https://www.google.com/maps/search/ambulance+service+near+me"
       target="_blank">

        <button class="btn btn-danger btn-lg mt-4 mb-4">
            🗺️ Open Google Maps
        </button>

    </a>

    <!-- MAP -->

    <iframe
        src="https://www.google.com/maps?q=ambulance+service+near+me&output=embed"
        width="100%"
        height="500">
    </iframe>

</div>

</body>
</html>
