<!DOCTYPE html>
<html>

<head>
    <title>ROADSoS Login</title>

    <style>

        body{
            background:#f2f2f2;
            font-family:Arial;
            text-align:center;
            padding-top:100px;
        }

        .box{
            background:white;
            width:300px;
            margin:auto;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            background:red;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:10px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>🚨 ROADSoS</h1>

    <form action="/home">

        <input type="email" placeholder="Enter Email">

        <input type="password" placeholder="Enter Password">

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
